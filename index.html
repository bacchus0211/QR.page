<style>
  /* ===== 本家 index.html と完全共通のトークン ===== */
  :root {
    --black:    #000000;
    --dark:     #0d0d0d;
    --red:      #cc1111;
    --red2:     #d42f19;
    --white:    #ffffff;
    --offwhite: #f0ece4;
    --gray:     #777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--offwhite);
    font-family: "Noto Serif JP", serif;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* ===== 四隅カギ括弧（本家 .hero-frame そのまま） ===== */
  .frame {
    position: fixed;
    inset: 20px;
    border: 1px solid rgba(204,17,17,0.15);
    pointer-events: none;
    z-index: 10;
  }
  .frame::before, .frame::after {
    content: "";
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--red);
    border-style: solid;
  }
  .frame::before { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
  .frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* ===== 赤いグロウ（本家 .hero-glow そのまま） ===== */
  .glow {
    position: fixed;
    top: 0; left: 50%;
    translate: -50% -20%;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,10,10,0.15) 0%, transparent 70%);
    animation: glow 5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glow {
    0%, 100% { transform: scale(1);    opacity: 0.6; }
    50%       { transform: scale(1.2); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    .glow { animation: none; }
  }

  /* ===== メインコンテンツ ===== */
  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    text-align: center;
    animation: fadeUp 0.9s ease 0.2s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== SVGバッジ（本家 .hero-badge と同型） ===== */
  .badge {
    display: inline-block;
    margin-bottom: 36px;
    filter: drop-shadow(0 0 48px rgba(204,17,17,0.4));
  }
  .badge svg {
    width: min(200px, 52vw);
    height: min(200px, 52vw);
  }

  /* ===== セクション文法（本家と完全共通） ===== */
  .sec-label {
    font-family: "Cinzel", serif;
    font-size: 10px;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    color: var(--red);
    display: block;
    margin-bottom: 14px;
  }
  .sec-title {
    font-family: sabbath-black, "Cinzel", serif;
    font-size: clamp(36px, 10vw, 52px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .sec-subtitle {
    font-family: sabbath-black, "Cinzel", serif;
    font-size: clamp(12px, 3vw, 16px);
    color: var(--red);
    letter-spacing: 0.2em;
    margin-bottom: 28px;
    display: block;
  }
  .sec-divider {
    width: 72px;
    margin: 0 auto 40px;
  }
  .sec-divider .l1 { height: 2px; background: var(--red); margin-bottom: 3px; }
  .sec-divider .l2 { height: 1px; background: rgba(255,255,255,0.15); }

  /* ===== 扉（本家 .menu-grid + .menu-card と同型） ===== */
  .doors {
    display: grid;
    gap: 2px;
    background: rgba(204,17,17,0.22);
    border: 1px solid rgba(204,17,17,0.22);
    text-align: left;
  }

  .door {
    display: block;
    text-decoration: none;
    background: var(--dark);
    padding: 22px 20px 19px;
    transition: background 0.3s;
  }
  .door:hover, .door:active { background: #150808; }
  .door:focus-visible { outline: 2px solid var(--red2); outline-offset: -4px; }

  .door .en {
    display: block;
    font-family: sabbath-black, "Cinzel", serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--white);
    margin-bottom: 6px;
  }
  .door .jp {
    display: block;
    font-size: 11.5px;
    letter-spacing: 0.06em;
    color: var(--gray);
    line-height: 1.7;
  }

  /* 主役の扉（本家 .reserve と同型：赤ベタ＋斜めストライプ） */
  .door.primary {
    position: relative;
    background: var(--red);
    overflow: hidden;
    padding: 28px 20px 24px;
    text-align: center;
  }
  .door.primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 18px,
      rgba(0,0,0,0.06) 18px, rgba(0,0,0,0.06) 36px
    );
  }
  .door.primary:hover, .door.primary:active { background: var(--red2); }
  .door.primary > * { position: relative; z-index: 1; }
  .door.primary .en {
    font-size: 22px;
    color: var(--white);
    margin-bottom: 8px;
  }
  .door.primary .jp {
    color: rgba(255,255,255,0.82);
    text-align: center;
  }

  /* ===== マップ（本家 .access-map と完全共通） ===== */
  .access-map {
    height: 220px;
    border: 1px solid rgba(204,17,17,0.3);
    overflow: hidden;
    margin-top: 2px;
  }
  .access-map iframe {
    width: 100%;
    height: 100%;
    border: none;
    filter: grayscale(1) contrast(0.85) invert(0.88);
    transition: filter 0.5s;
  }
  .access-map:hover iframe {
    filter: grayscale(0.2) contrast(1) invert(0);
  }

  /* ===== 営業時間 ===== */
  .hours {
    margin-top: 32px;
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gray);
  }
  .hours strong {
    color: var(--offwhite);
    font-weight: 700;
  }

  /* ===== フッター（本家と同型） ===== */
  footer {
    margin-top: 44px;
    padding-top: 28px;
    border-top: 1px solid rgba(204,17,17,0.22);
    font-family: "Cinzel", serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #333;
    line-height: 2.2;
  }
  footer a {
    color: #555;
    text-decoration: none;
    border-bottom: 1px solid rgba(204,17,17,0.35);
    transition: color 0.2s;
  }
  footer a:hover { color: var(--offwhite); }
</style>
